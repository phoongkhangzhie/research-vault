name: Publish to PyPI

# Trigger: a version tag pushed manually by the maintainer.
# Usage: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release-gate:
    # PR-CC-7: the release-blocking subset (CHECK-8b/c — CITATION.cff/LICENSE)
    # gates the actual release path. `rv code check` degrades CHECK-8b/c to
    # WARN in local/CI-push mode (scripts/ci_dogfood_checks.sh) but HARD here
    # (--release), on rv's own repo — a real tag push must not publish a
    # release missing/invalid CITATION.cff or LICENSE.
    # See docs/superpowers/specs/2026-07-07-code-conventions-design.md §8.
    name: Release-blocking code-conventions gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        run: uv sync

      - name: rv code check --release (CHECK-8b/c HARD — CITATION.cff + LICENSE)
        run: |
          CONFIG_FILE="$(mktemp)"
          cat > "$CONFIG_FILE" <<EOF
          instance_root = "$(pwd)"

          [projects.research-vault]
          source_dir = "$(pwd)"
          EOF
          RESEARCH_VAULT_CONFIG="$CONFIG_FILE" uv run rv code check research-vault --release

  build:
    name: Build distribution
    needs: release-gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/research-vault/

    # PyPI Trusted Publishing (OIDC) — no PYPI_TOKEN secret required.
    # The pending publisher must be registered on PyPI before the first release.
    # See RELEASING.md for the exact registration steps.
    permissions:
      id-token: write

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
