name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Hermetic pytest suite ────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # SR-PKG: install Tier-1 defaults + dev deps only.
        # --all-extras would pull [local] (torch/vllm/sglang) which cannot
        # resolve on CPU CI runners. Tier-2 is GPU-only and must stay opt-in.
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ── Leakage scanner (full teeth — SR-4, broadened SR-PKG) ──────────────────
  # SR-PKG: doctrine/ + examples/ moved into the wheel at
  #   src/research_vault/data/doctrine/ + src/research_vault/data/examples/.
  # Coverage broadened to the whole publish-bound tree (whole-tree by default,
  # opt-out by exception — the safe polarity for a public publish).
  # Scans: package data (doctrine/ + examples/), root public-bound
  # files (README.md, architecture.md, QUICKSTART.md, REFERENCES.md, SETUP.md),
  # and src/ for hardcoded private paths — all private marker classes:
  #   codenames · identity strings · site URLs · cluster paths ·
  #   secret-shaped strings · versioned model IDs · non-template memory slugs
  # Implemented in scripts/leakage_scan.sh (tested hermetically in tests/).
  leakage-scan:
    name: Leakage scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run leakage scanner over src/research_vault/data/doctrine/
        run: bash scripts/leakage_scan.sh src/research_vault/data/doctrine

      - name: Run leakage scanner over src/research_vault/data/examples/
        run: bash scripts/leakage_scan.sh src/research_vault/data/examples

      # SR-CCB: CLAUDE.md.tmpl ships in the wheel and gets written to every
      # adopter's instance root — must be leakage-clean (publish-bound).
      - name: Run leakage scanner over src/research_vault/data/templates/
        run: bash scripts/leakage_scan.sh src/research_vault/data/templates

      - name: Run leakage scanner over root public-bound files
        run: |
          # Scan public-bound root files individually.
          # architecture.md is scaffolded by `rv init` for adopter projects
          # (CS-project-structure convention, PR-1/PR-2); if present here it must
          # be clean, but the `[ -f ]` guard below skips it when absent (this
          # repo's own local copy is untracked — see .gitignore).
          # REFERENCES.md and SETUP.md scanned when present (future artifacts).
          # LICENSE + pyproject.toml added (SR-SETUP: ship to PyPI — must be clean).
          for f in README.md architecture.md QUICKSTART.md REFERENCES.md SETUP.md LICENSE CITATION.cff pyproject.toml RELEASING.md; do
            if [ -f "$f" ]; then
              echo "--- scanning $f ---"
              bash scripts/leakage_scan.sh "$f"
            fi
          done

      - name: Check for hardcoded private paths in src/
        run: |
          echo "=== Hardcoded path scan (src/) ==="
          if grep -rn --include="*.py" \
              -E "(/juice2/|/scr2/|phoongkz|phoongkhangzhie)" \
              src/ 2>/dev/null; then
            echo "FAIL: hardcoded private paths found in src/"
            exit 1
          fi
          echo "OK: no hardcoded private paths in src/"

      # Hygiene-batch: class 10 crew narrative-names in Python source.
      # Catches session-narrative attributions (Ada/Wren/Mason/Argus/Iris/Atlas)
      # in shipped .py files. Runs leakage_scan.sh over src/ — the _grep_py_word
      # helper in class 10 restricts matches to .py files only, so role docs
      # (*.md in data/doctrine/roles/) are not flagged.
      - name: Check for crew narrative-names in src/ Python source
        run: bash scripts/leakage_scan.sh src/research_vault

      # Root-cause fix: tests/ was never scanned by ANY class, so real private
      # codenames (cultural-social-sim, csb) leaked into shipped test files
      # (test_config.py, test_experiment_run.py, etc.) undetected. tests/ is not
      # shipped in the wheel, but it IS a public tracked file in the OSS repo, so
      # class-1 codenames in it are still a real leak of private project identity.
      # Scoped to --codenames-only (class 1 alone): tests/*.py legitimately
      # contains fixtures that would false-positive under the other classes (fake
      # sk-ant-* secrets, casual "Khang" attribution comments, model-id regex
      # fixtures) — see scripts/leakage_scan.sh's flag doc for the full rationale.
      - name: Check for private codenames in tests/
        run: bash scripts/leakage_scan.sh tests --codenames-only

  # ── help --check gate ───────────────────────────────────────────────────────
  help-check:
    name: rv help --check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        # SR-PKG: Tier-1 defaults only — Tier-2 [local] is GPU-only, not for CI.
        run: uv sync

      - name: Verify all verbs have when_to_use docstrings
        run: uv run rv help --check

  # ── rv lint gate ────────────────────────────────────────────────────────────
  # Runs the project linter over the whole repo: leakage scan + config schema +
  # verb docstring gate + test-hygiene rules (vacuous assertions, unpinned git
  # init) + F811 redefined-while-unused check (catches shadowed def/class names
  # in src/research_vault/ — the SR-MS-2 duplicate check_manuscript gap).
  rv-lint:
    name: rv lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        # SR-PKG: Tier-1 defaults only — Tier-2 [local] is GPU-only, not for CI.
        run: uv sync

      - name: Run rv lint (full repo)
        run: uv run rv lint

  # ── Code-conventions dogfood (PR-CC-7) ──────────────────────────────────────
  # Wires the note-plane gate (`rv note check`) and the repo-plane gate
  # (`rv code check`) into CI so the code-conventions capability (CC-1..CC-6)
  # actually fires on every push/PR — not just when a human remembers to run it
  # locally. Two real fixtures (rv has no OKF notes of its own to check):
  #   - note-plane: the packaged demo-research example (real OKF content —
  #     non-vacuous; this dogfood run surfaced + fixed a real supports_main
  #     content bug, see DEVLOG).
  #   - repo-plane: rv's own repo tree (real dogfood — CHECK-8b/c fire
  #     against rv's actual CITATION.cff/LICENSE).
  # Also runs the release-blocking subset (--release: CHECK-8b/c HARD) here
  # so drift is caught on every push, ahead of an actual release tag.
  # verify-CI-not-relay: this step must be read via the Actions API to confirm
  # it actually ran + passed — never taken on a relayed "green" claim.
  code-conventions-dogfood:
    name: Code-conventions dogfood (rv note check + rv code check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        run: uv sync

      - name: rv note check + rv code check (repo-wide dogfood)
        run: bash scripts/ci_dogfood_checks.sh

  # ── Release-gate canary (PR-CC-7) ────────────────────────────────────────────
  # A rejects-only proof (charter §9/§10) that `rv code check --release` really
  # flips: RED on a missing/invalid CITATION.cff, GREEN when present+valid.
  # Runs against an ephemeral fixture (not rv's own repo) so this job's result
  # never depends on rv's own release-readiness — it only certifies the GATE
  # MECHANISM itself. See scripts/release_gate_canary.sh.
  release-gate-canary:
    name: Release-gate canary (CHECK-8b/c flip proof)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        run: uv sync

      - name: Prove the release gate flips (red on missing CITATION.cff, green otherwise)
        run: bash scripts/release_gate_canary.sh
