[project]
name = "research-vault"
version = "0.1.0"
description = "Research Vault — an adoptable, zero-infra AI research-assistant framework"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
rv = "research_vault.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/research_vault"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
]
