[project]
name = "research-vault"
version = "0.1.0"
description = "Research Vault — an adoptable, zero-infra AI research-assistant framework"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

# SR-FIG: the figures capability is the first dependency-bearing optional extra.
# Core stays stdlib-only; figures needs matplotlib/seaborn/pandas behind the extra.
# Install: pip install research-vault[figures]
[project.optional-dependencies]
figures = [
    "matplotlib>=3.8",
    "seaborn>=0.13",
    "pandas>=2.2",
]

[project.scripts]
rv = "research_vault.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/research_vault"]
# SR-PKG: doctrine/, examples/, and templates/ now live inside the wheel at
# src/research_vault/data/. Hatchling includes all package-directory files by
# default, but we declare artifacts explicitly so the intent is self-documenting
# and robust against future exclude-glob additions.
artifacts = [
    "src/research_vault/data/**",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
]

[tool.pytest.ini_options]
# SR-PKG: 'slow' marks the isolated-wheel smoke test (build+install+run).
# Run with: pytest -m slow  (CI: add a dedicated job in SR-META).
markers = [
    "slow: isolated wheel build+install+run smoke tests (may take 30s+)",
]
